[program:rag-api]
command = /workspace/rag-pipeline/run_api.sh
directory = /workspace/rag-pipeline
user = root
autostart = true
autorestart = true
stopasgroup = true
killasgroup = true
stderr_logfile = /workspace/rag-pipeline/supervisor.err.log
stdout_logfile = /workspace/rag-pipeline/supervisor.out.log
stdout_logfile_maxbytes = 10MB
redirect_stderr = true